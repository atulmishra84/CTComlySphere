version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: complysphere
      POSTGRES_USER: complysphere
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U complysphere"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://complysphere:${POSTGRES_PASSWORD:-changeme}@db:5432/complysphere
      SESSION_SECRET: ${SESSION_SECRET:-change-this-secret-in-production}
    ports:
      - "5000:5000"

  seed:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://complysphere:${POSTGRES_PASSWORD:-changeme}@db:5432/complysphere
      SESSION_SECRET: ${SESSION_SECRET:-change-this-secret-in-production}
    command: python3 seed_azure_data.py
    restart: "no"

volumes:
  postgres_data:
