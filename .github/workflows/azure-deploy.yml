name: Deploy to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.ACR_NAME }}.azurecr.io
  IMAGE_NAME: complysphere
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  CONTAINERAPP_NAME: ${{ secrets.AZURE_APP_NAME }}
  LOCATION: eastus

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        run: |
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          echo "Logged in — subscription active"

      - name: Install Container Apps CLI extension
        run: az extension add --name containerapp --upgrade -y

      - name: Register required Azure providers
        run: |
          az provider register --namespace Microsoft.App --wait
          az provider register --namespace Microsoft.OperationalInsights --wait
          az provider register --namespace Microsoft.DBforPostgreSQL --wait
          az provider register --namespace Microsoft.ContainerRegistry --wait

      - name: Create Resource Group if missing
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }} \
            --output none

      - name: Create Container Registry if missing
        run: |
          az acr create \
            --name ${{ secrets.ACR_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --sku Basic \
            --admin-enabled true \
            --output none 2>/dev/null || echo "ACR already exists"

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          IMAGE_LATEST=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker build -t $IMAGE_TAG -t $IMAGE_LATEST .
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Create PostgreSQL server and build DATABASE_URL
        run: |
          EXISTS=$(az postgres flexible-server show \
            --name complysphere-pg \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query name -o tsv 2>/dev/null || echo "")

          if [ -z "$EXISTS" ]; then
            echo "Creating PostgreSQL server..."
            az postgres flexible-server create \
              --name complysphere-pg \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --location ${{ env.LOCATION }} \
              --admin-user complyadmin \
              --admin-password "${{ secrets.PG_ADMIN_PASSWORD }}" \
              --sku-name Standard_B1ms \
              --tier Burstable \
              --storage-size 32 \
              --version 16 \
              --public-access 0.0.0.0 \
              --output none
            az postgres flexible-server db create \
              --server-name complysphere-pg \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --database-name complysphere \
              --output none
          else
            echo "PostgreSQL server already exists"
          fi

          PG_HOST=$(az postgres flexible-server show \
            --name complysphere-pg \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query fullyQualifiedDomainName -o tsv)

          DB_URL="postgresql://complyadmin:${{ secrets.PG_ADMIN_PASSWORD }}@${PG_HOST}:5432/complysphere?sslmode=require"
          echo "DATABASE_URL=$DB_URL" >> $GITHUB_ENV
          echo "PostgreSQL host: $PG_HOST"

      - name: Create Container Apps Environment and wait for provisioning
        run: |
          STATE=$(az containerapp env show \
            --name complysphere-env \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.provisioningState" -o tsv 2>/dev/null || echo "")

          echo "Current environment state: '$STATE'"

          if [ "$STATE" = "Succeeded" ]; then
            echo "Environment already provisioned and healthy."
          else
            if [ -n "$STATE" ]; then
              echo "Environment exists but is in '$STATE' state — deleting and recreating..."
              az containerapp env delete \
                --name complysphere-env \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --yes --no-wait
              echo "Waiting 30s for deletion to complete..."
              sleep 30
            fi

            echo "Creating Container Apps environment..."
            az containerapp env create \
              --name complysphere-env \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --location ${{ env.LOCATION }} \
              --output none

            echo "Polling for environment to reach Succeeded state..."
            for i in $(seq 1 30); do
              STATE=$(az containerapp env show \
                --name complysphere-env \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --query "properties.provisioningState" -o tsv 2>/dev/null || echo "Unknown")
              echo "  Attempt $i/30 — state: $STATE"
              if [ "$STATE" = "Succeeded" ]; then
                echo "Environment is ready."
                break
              fi
              if [ "$i" = "30" ]; then
                echo "ERROR: Environment did not reach Succeeded state after 7.5 minutes."
                exit 1
              fi
              sleep 15
            done
          fi

      - name: Get ACR credentials
        id: acr-creds
        run: |
          ACR_USERNAME=$(az acr credential show --name ${{ secrets.ACR_NAME }} --query username -o tsv)
          ACR_PASSWORD=$(az acr credential show --name ${{ secrets.ACR_NAME }} --query "passwords[0].value" -o tsv)
          echo "acr_username=$ACR_USERNAME" >> $GITHUB_OUTPUT
          echo "acr_password=$ACR_PASSWORD" >> $GITHUB_OUTPUT

      - name: Create or update Container App
        run: |
          EXISTS=$(az containerapp show \
            --name ${{ env.CONTAINERAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query name -o tsv 2>/dev/null || echo "")

          if [ -z "$EXISTS" ]; then
            echo "Creating Container App for the first time..."
            az containerapp create \
              --name ${{ env.CONTAINERAPP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --environment complysphere-env \
              --image ${{ env.IMAGE_TAG }} \
              --registry-server ${{ env.REGISTRY }} \
              --registry-username ${{ steps.acr-creds.outputs.acr_username }} \
              --registry-password ${{ steps.acr-creds.outputs.acr_password }} \
              --target-port 5000 \
              --ingress external \
              --min-replicas 1 \
              --max-replicas 5 \
              --cpu 1.0 \
              --memory 2.0Gi \
              --env-vars \
                "DATABASE_URL=${{ env.DATABASE_URL }}" \
                "SESSION_SECRET=${{ secrets.SESSION_SECRET }}" \
                "FLASK_ENV=production" \
                "PYTHONUNBUFFERED=1" \
              --output none
          else
            echo "Updating existing Container App..."
            az containerapp update \
              --name ${{ env.CONTAINERAPP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.IMAGE_TAG }} \
              --set-env-vars \
                "DATABASE_URL=${{ env.DATABASE_URL }}" \
                "SESSION_SECRET=${{ secrets.SESSION_SECRET }}" \
                "FLASK_ENV=production" \
                "PYTHONUNBUFFERED=1" \
              --output none
          fi

      - name: Get and display app URL
        run: |
          URL=$(az containerapp show \
            --name ${{ env.CONTAINERAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo ""
          echo "========================================"
          echo "  DEPLOYED: https://$URL"
          echo "========================================"
